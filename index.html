<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aprovador</title>

  <style>
    body { margin:0; font-family: Arial; background:#f5f5f5; }
    .container { max-width:700px; margin:40px auto; background:#fff; padding:20px; border-radius:12px; }
    iframe { border:0; width:100%; }
    .carousel { overflow:hidden; position:relative; }
    .track { display:flex; transition:0.3s; }
    .slide { min-width:100%; }
    button { cursor:pointer; }
  </style>
</head>

<body>

<div class="container" id="app"></div>

<script>
function extractDriveId(url) {
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

function renderIframe(id) {
  return `<iframe src="https://drive.google.com/file/d/${id}/preview" height="520"></iframe>`;
}

function renderImagem(url) {
  const id = extractDriveId(url);
  if (!id) return '<p>Link inválido</p>';
  return renderIframe(id);
}

let current = 0;

function renderCarrossel(imagens) {
  current = 0;

  const slides = imagens.map(url => {
    const id = extractDriveId(url);
    return `<div class="slide">${renderIframe(id)}</div>`;
  }).join('');

  return `
    <div class="carousel">
      <div class="track" id="track">${slides}</div>
      <button onclick="prev()">‹</button>
      <button onclick="next()">›</button>
    </div>
  `;
}

function prev() {
  const track = document.getElementById('track');
  const total = track.children.length;
  current = (current - 1 + total) % total;
  track.style.transform = 'translateX(-' + current * 100 + '%)';
}

function next() {
  const track = document.getElementById('track');
  const total = track.children.length;
  current = (current + 1) % total;
  track.style.transform = 'translateX(-' + current * 100 + '%)';
}

// 🔧 TESTE (depois você conecta com seu backend)
const imagens = [
  "https://drive.google.com/file/d/1abc123/view",
  "https://drive.google.com/file/d/1def456/view"
];

// alterna entre imagem única ou carrossel
document.getElementById('app').innerHTML =
  imagens.length > 1 ? renderCarrossel(imagens) : renderImagem(imagens[0]);

</script>

</body>
</html>
